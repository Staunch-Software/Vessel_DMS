<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Red square background rotated 45deg -->
  <rect x="10" y="10" width="80" height="80" fill="#cc2222" transform="rotate(45 50 50)" rx="2"/>
  <!-- White inner diamond border -->
  <rect x="18" y="18" width="64" height="64" fill="none" stroke="white" stroke-width="5" transform="rotate(45 50 50)" rx="1"/>
  <!-- Navy N letter -->
  <text
    x="50"
    y="65"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="48"
    fill="#1a1f5e"
    text-anchor="middle"
    letter-spacing="-2"
  >N</text>
</svg>
